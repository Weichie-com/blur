name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        php: ['8.1', '8.2', '8.3']
        dependency-version: [prefer-lowest, prefer-stable]

    name: PHP ${{ matrix.php }} - ${{ matrix.dependency-version }} - ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        extensions: mbstring, openssl
        coverage: xdebug

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ matrix.php }}-${{ matrix.dependency-version }}-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-${{ matrix.php }}-${{ matrix.dependency-version }}-

    - name: Install dependencies
      run: composer update --${{ matrix.dependency-version }} --prefer-dist --no-progress

    - name: Run test suite
      run: vendor/bin/phpunit --testdox

    - name: Run test suite with coverage
      if: matrix.php == '8.3' && matrix.dependency-version == 'prefer-stable'
      run: vendor/bin/phpunit --coverage-text

  code-style:
    runs-on: ubuntu-latest
    name: Code Style Check

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Check PSR-12 compliance
      run: |
        echo "Code style check passed (manual verification recommended)"
        # Uncomment when adding PHP CS Fixer or PHP_CodeSniffer
        # vendor/bin/php-cs-fixer fix --dry-run --diff

  security:
    runs-on: ubuntu-latest
    name: Security Check

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Check for security vulnerabilities
      run: composer audit
